<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이전 사례 - 딥러닝 모델 최적화</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #f5c842;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .slide {
      width: 100%;
      max-width: 1400px;
      min-height: 480px;
      background: #f5c842;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 40px;
      position: relative;
      padding: 40px 60px;
    }

    .arrow {
      font-size: 2.8rem;
      font-weight: 700;
      color: #333;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      user-select: none;
    }

    /* ── 왼쪽 텍스트 영역 (선택) ── */
    .description {
      flex: 1;
      max-width: 420px;
      font-size: 0.92rem;
      line-height: 1.8;
      color: #333;
      display: none; /* 이미지처럼 텍스트 없이 화살표만 */
    }

    /* ── 오른쪽 카드 ── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 24px 28px 20px;
      min-width: 600px;
      max-width: 640px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead th {
      text-align: right;
      padding: 6px 12px 10px;
      color: #555;
      font-weight: 600;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }

    thead th:first-child { text-align: left; }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 10px 12px;
      text-align: right;
      color: #222;
    }

    tbody td:first-child { text-align: left; }

    /* 기준 모델 태그 */
    .badge-baseline {
      display: inline-block;
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 6px;
      font-weight: 500;
    }

    /* 최고값 하이라이트 */
    .best {
      color: #2e7d32;
      font-weight: 700;
    }

    /* 범례 */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 14px;
      font-size: 0.78rem;
      color: #555;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot-green { background: #2e7d32; }
    .dot-blue  { background: #1a73e8; }
  </style>
</head>
<body>
  <div class="slide">

    <!-- 화살표 -->
    <div class="arrow">-&gt;</div>

    <!-- 비교 테이블 카드 -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>모델</th>
            <th>정확도 (%)</th>
            <th>파라미터 수</th>
            <th>크기 (MB)</th>
            <th>추론속도 (ms)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Baseline <span class="badge-baseline">Baseline</span></td>
            <td>85.07</td>
            <td>812,962</td>
            <td>3.12</td>
            <td>1.92</td>
          </tr>
          <tr>
            <td>Knowledge Distillation</td>
            <td>84.80</td>
            <td>155,266</td>
            <td>0.60</td>
            <td class="best">0.50</td>
          </tr>
          <tr>
            <td>Quantization</td>
            <td>84.66</td>
            <td>812,962</td>
            <td class="best">0.82</td>
            <td>1.38</td>
          </tr>
          <tr>
            <td>Pruning 30%</td>
            <td>84.13</td>
            <td>812,962</td>
            <td>3.12</td>
            <td>2.00</td>
          </tr>
          <tr>
            <td>Pruning 50%</td>
            <td>84.85</td>
            <td>812,962</td>
            <td>3.12</td>
            <td>1.60</td>
          </tr>
          <tr>
            <td>Pruning 70%</td>
            <td>84.31</td>
            <td>812,962</td>
            <td>3.12</td>
            <td>1.77</td>
          </tr>
        </tbody>
      </table>

      <div class="legend">
        <div class="legend-item">
          <div class="dot dot-green"></div>
          <span>각 지표 최고값</span>
        </div>
        <div class="legend-item">
          <div class="dot dot-blue"></div>
          <span>기준 모델</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
